name: Weekly Zuyderhoven SEO

on:
  schedule:
    # Every Tuesday at 08:30 Europe/Amsterdam in winter-ish UTC offset safe enough for reporting.
    - cron: "30 6 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi

      - name: Run rank tracker
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: python scripts/rank_tracker.py

      - name: Run keyword gap analysis
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: python scripts/keyword_gaps.py

      - name: Generate weekly strategy report
        run: python scripts/weekly_zuyderhoven_report.py

      - name: Commit weekly SEO outputs
        run: |
          git config user.name "zuyderhoven-seo-bot"
          git config user.email "actions@github.com"
          git add rankings briefs reports
          if git diff --cached --quiet; then
            echo "No SEO output changes to commit."
          else
            git commit -m "Add weekly Zuyderhoven SEO report"
            git push
          fi

      - name: Upload SEO reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-zuyderhoven-seo
          path: |
            rankings/
            briefs/
            reports/
